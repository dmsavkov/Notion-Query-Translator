task: Add a new task into my Notion Tasks database with the title "Add_task_test", date today, importance of 4 and project ID from the ID_PROJECT_PAGE_ID environment variable.
properties:
  title: "Add_task_test"
  date: "today"
  importance: 4
  project_id: "${ID_PROJECT_PAGE_ID}"

solution: |
  def add_new_task(database_id, title, importance):
      import requests
      import os
      from datetime import datetime
      from dotenv import load_dotenv
      
      load_dotenv()
      NOTION_TOKEN = os.getenv("NOTION_TOKEN")
      project_id = os.getenv("ID_PROJECT_PAGE_ID")
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      url = "https://api.notion.com/v1/pages"
      
      # Parse "today" dynamically into an ISO 8601 string (YYYY-MM-DD)
      today_date = datetime.now().strftime("%Y-%m-%d")
      
      # Schema for creating a new database page with specific property types
      payload = {
          "parent": {
              "database_id": database_id
          },
          "properties": {
              "Name": {
                  "title":[
                      {
                          "text": {
                              "content": title
                          }
                      }
                  ]
              },
              "Due Date": {
                  "date": {
                      "start": today_date
                  }
              },
              "Importance": {
                  "select": {
                      "name": str(importance)
                  }
              },
              "Project": {
                  "relation": [
                      {
                          "id": project_id
                      }
                  ]
              }
          }
      }
      
      response = requests.post(url, headers=HEADERS, json=payload)
      return response.json()

  # Example usage:
  # add_new_task(os.getenv("NOTION_TASKS_DATABASE_ID"), "Add_task_test", 4)

correct_statements:
  - "Endpoint is POST https://api.notion.com/v1/pages for creating a new page (task) in a database."
  - "Header 'Notion-Version: 2022-06-28' is required on every request."
  - "The parent database is specified as: {'parent': {'database_id': '<id>'}} at the top level of the body."
  - "Title property uses structure: {'Name': {'title': [{'text': {'content': '<value>'}}]}}."
  - "Select property (Importance) uses structure: {'Importance': {'select': {'name': '<value>'}}} OR {'Importance': {'select': {'id': '<option-id>'}}}."
  - "Relation property (Project) uses structure: {'Project': {'relation': [{'id': '<page_id>'}]}}."
  - "Date property (Due Date) uses structure: {'Due Date': {'date': {'start': '<YYYY-MM-DD>'}}}."
