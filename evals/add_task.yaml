task: Add a new task into my Notion Tasks database with the title "Add_task_test", date today, importance of 4 and projects such as "Agents & LLMs Specialization".
properties:
  title: "Add_task_test"
  date: "today"
  importance: 4
  projects: ["Agents & LLMs Specialization"]

solution: |
  def add_new_task(database_id, title, importance, projects):
      import requests
      import os
      from datetime import datetime
      from dotenv import load_dotenv
      
      load_dotenv()
      NOTION_TOKEN = os.getenv("NOTION_TOKEN")
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      url = "https://api.notion.com/v1/pages"
      
      # Parse "today" dynamically into an ISO 8601 string (YYYY-MM-DD)
      today_date = datetime.now().strftime("%Y-%m-%d")
      
      # Schema for creating a new database page with specific property types
      payload = {
          "parent": {
              "database_id": database_id
          },
          "properties": {
              "Name": {
                  "title":[
                      {
                          "text": {
                              "content": title
                          }
                      }
                  ]
              },
              "Date": {
                  "date": {
                      "start": today_date
                  }
              },
              "Importance": {
                  "number": importance
              },
              "Projects": {
                  "multi_select": [
                      {"name": project} for project in projects
                  ]
              }
          }
      }
      
      response = requests.post(url, headers=HEADERS, json=payload)
      return response.json()

  # Example usage:
  # add_new_task(os.getenv("NOTION_TASKS_DATABASE_ID"), "Add_task_test", 4, ["Agents & LLMs Specialization"])
