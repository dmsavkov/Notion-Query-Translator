  input_state:
    user_prompt: "Check task 'New problem'. If its Status is Done, mark every task in its Blocking relation as Done."
    required_resources: ["New problem"]
    start_as_node: "plan"
    interrupt_before:
      - "cleanup_sandbox"
    static_context_name: "database_schema_report_comprehensive__notion_api_top25_20220628"
  reference_outputs:
    correct_statements:
      - "Finds 'New problem' using POST https://api.notion.com/v1/databases/{tasks_database_id}/query with a Name title equals filter."
      - "Checks parent task status from properties.Status.select.name and proceeds only when status is 'Done'."
      - "Reads blocked ids from properties.Blocking.relation."
