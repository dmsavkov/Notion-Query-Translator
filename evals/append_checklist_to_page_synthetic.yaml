# add checklist items to a page
task: Add a checklist to the inbox page containing the items: "Read documentation", "Draft code", and "Test API".
properties:
  checklist_items: ["Read documentation", "Draft code", "Test API"]

solution: |
  def append_checklist_to_page(page_id, checklist_items):
      import requests
      import os
      from dotenv import load_dotenv
      
      load_dotenv()
      NOTION_TOKEN = os.getenv("NOTION_TOKEN")
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      url = f"https://api.notion.com/v1/blocks/{page_id}/children"
      
      # Dynamically build the array of 'to_do' block objects
      blocks_to_append = []
      for item in checklist_items:
          blocks_to_append.append({
              "object": "block",
              "type": "to_do",
              "to_do": {
                  "rich_text": [
                      {
                          "type": "text",
                          "text": {
                              "content": item
                          }
                      }
                  ],
                  "checked": False
              }
          })
      
      # Payload wrapper for appending children
      payload = {
          "children": blocks_to_append
      }
      
      response = requests.patch(url, headers=HEADERS, json=payload)
      return response.json()
  
  # Example usage:
  # append_checklist_to_page(os.getenv("NOTION_INBOX_PAGE_ID"), ["Read documentation", "Draft code", "Test API"])
