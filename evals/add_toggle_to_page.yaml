# add toggle to a page with id
task: Add a new toggle to my Notion page with the title "Add_toggle_test" and content "This is a test toggle". The page id is "24ecb17dcc4480beb3a6e6f0e4751989".
properties:
  title: "Add_toggle_test"
  content: "This is a test toggle"
solution: |
  import requests
  import os
  from dotenv import load_dotenv

  load_dotenv()

  def add_toggle_to_page(page_id, title, content):
      NOTION_TOKEN = os.getenv("NOTION_TOKEN")
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      url = f"https://api.notion.com/v1/blocks/{page_id}/children"
      
      # Schema for appending a Toggle block with nested children
      payload = {
          "children":[
              {
                  "object": "block",
                  "type": "toggle",
                  "toggle": {
                      "rich_text":[
                          {
                              "type": "text",
                              "text": {
                                  "content": title
                              }
                          }
                      ],
                      "children":[
                          {
                              "object": "block",
                              "type": "paragraph",
                              "paragraph": {
                                  "rich_text":[
                                      {
                                          "type": "text",
                                          "text": {
                                              "content": content
                                          }
                                      }
                                  ]
                              }
                          }
                      ]
                  }
              }
          ]
      }
      
      response = requests.patch(url, headers=HEADERS, json=payload)
      return response.json()

  # Example usage:
  # add_toggle_to_page(os.getenv("NOTION_INBOX_PAGE_ID"), "Add_toggle_test", "This is a test toggle")

rag_eval_statements:
  - "Endpoint is PATCH https://api.notion.com/v1/blocks/{page_id}/children for appending blocks to a page."
  - "Header 'Notion-Version: 2022-06-28' is required on every request."
  - "Appended blocks are wrapped in a top-level 'children' array in the request body."
  - "Toggle block requires 'type': 'toggle' and 'toggle' key containing 'rich_text' array for the title."
  - "Rich text items use structure: [{'type': 'text', 'text': {'content': '<value>'}}]."
  - "Nested content inside toggle is placed in 'children' array on toggle object, using 'type': 'paragraph'."
