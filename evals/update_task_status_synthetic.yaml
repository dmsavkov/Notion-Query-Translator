# update task status to completed and clearing date
task: Update the task with id 316cb17dcc44808787b8e20f2da4b505 by changing its "Status" to "Done" and clearing the date.
properties:
  page_id: "316cb17dcc44808787b8e20f2da4b505"
  status: "Done"
  due_date: null

solution: |
  def update_task_status(page_id, status_value):
      import requests
      import os
      from dotenv import load_dotenv
      
      load_dotenv()
      NOTION_TOKEN = os.getenv("NOTION_TOKEN")
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      url = f"https://api.notion.com/v1/pages/{page_id}"
      
      # Schema for updating specific page properties
      # Note: Property names ("Status") must exactly match your Notion columns.
      payload = {
          "properties": {
              "Status": {
                  "status": {
                      "name": status_value
                  }
              },
              "Due Date": {
                  "date": {
                    "start": None  # Clear the date by setting it to None
                  }
              }
          }
      }
      
      response = requests.patch(url, headers=HEADERS, json=payload)
      return response.json()

  # Example usage:
  # update_task_status("316cb17dcc44808787b8e20f2da4b505", "Done")
