# update task status to completed and clearing date
task: Update the task with id from the ID_UPDATE_PAGE_ID environment variable by changing its "Status" to "Done" and clearing the date.
properties:
  page_id: "${ID_UPDATE_PAGE_ID}"
  status: "Done"
  due_date: null

solution: |
  def update_task_status(status_value):
      import requests
      import os
      from dotenv import load_dotenv
      
      load_dotenv()
      NOTION_TOKEN = os.getenv("NOTION_TOKEN")
      page_id = os.getenv("ID_UPDATE_PAGE_ID")
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      url = f"https://api.notion.com/v1/pages/{page_id}"
      
      # Schema for updating specific page properties
      # Note: Property names ("Status") must exactly match your Notion columns.
      payload = {
          "properties": {
              "Status": {
                  "select": {
                      "name": status_value
                  }
              },
              "Due Date": {
                  "date": {
                    "start": None  # Clear the date by setting it to None
                  }
              }
          }
      }
      
      response = requests.patch(url, headers=HEADERS, json=payload)
      return response.json()

  # Example usage:
  # update_task_status("Done")

correct_statements:
  - "The workflow builds a PATCH payload updating Status to 'Done' and clearing Due Date by setting it to None, then PATCHes https://api.notion.com/v1/pages/{page_id} to update the task."
  - "Endpoint is PATCH https://api.notion.com/v1/pages/{page_id} for updating a page."
  - "Header 'Notion-Version: 2022-06-28' is required on every request."
  - "Header 'Authorization: Bearer <token>' is required as authentication."
  - "Status-type property update uses structure: {'select': {'name': 'Done'}} OR {'select': {'id': '<status-id>'}} (using the correct property type 'select', not 'status')."
  - "Clear a date property by setting: {'date': {'start': None}}."
  - "All property updates are placed under the top-level 'properties' key in the PATCH body."
