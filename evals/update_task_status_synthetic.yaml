# update task status to completed and mark as reviewed
task: Update the task with id 316cb17dcc44808787b8e20f2da4b505 by changing its "Status" to "Done" and checking the "Reviewed" checkbox.
properties:
  page_id: "316cb17dcc44808787b8e20f2da4b505"
  status: "Done"
  reviewed: true

solution: |
  def update_task_status(page_id, status_value, is_reviewed):
      import requests
      
      NOTION_TOKEN = "your_integration_token"
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      url = f"https://api.notion.com/v1/pages/{page_id}"
      
      # Schema for updating specific page properties
      # Note: Property names ("Status", "Reviewed") must exactly match your Notion columns.
      payload = {
          "properties": {
              "Status": {
                  "status": {
                      "name": status_value
                  }
              },
              "Reviewed": {
                  "checkbox": is_reviewed
              }
          }
      }
      
      response = requests.patch(url, headers=HEADERS, json=payload)
      return response.json()

  # Example usage:
  # update_task_status("316cb17dcc44808787b8e20f2da4b505", "Done", True)
