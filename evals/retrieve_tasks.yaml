# retrieve last 3 tasks from Tasks database and sort by importanc eand then urgency
task: Retrieve the last 3 tasks from my Notion Tasks database and sort them by importance and then urgency.
properties:
  database: "Tasks"
  sort_by: ["importance", "urgency"]
  limit: 3
solution: |
  def retrieve_sorted_tasks(database_id):
      import requests
      import os
      from dotenv import load_dotenv
      
      load_dotenv()
      NOTION_TOKEN = os.getenv("NOTION_TOKEN")
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      url = f"https://api.notion.com/v1/databases/{database_id}/query"
      
      # Schema for querying and sorting a Notion database
      payload = {
          "page_size": 3,
          "sorts":[
              {
                  "property": "Importance",
                  "direction": "descending"
              },
              {
                  "property": "Urgency",
                  "direction": "descending"
              }
          ]
      }
      
      response = requests.post(url, headers=HEADERS, json=payload)
      return response.json()

  # Example usage:
  # retrieve_sorted_tasks(os.getenv("NOTION_TASKS_DATABASE_ID"))

correct_statements:
  - "Endpoint is POST https://api.notion.com/v1/databases/{database_id}/query for querying a database."
  - "Header 'Notion-Version: 2022-06-28' is required on every request."
  - "Result count is limited via the 'page_size' key in the request body (e.g. 'page_size': 3)."
  - "Sorting is defined under a 'sorts' array: [{'property': 'Importance', 'direction': 'descending'}, ...]."
  - "Each sort entry requires both 'property' (exact column name) and 'direction' ('ascending' or 'descending')."
  - "Multiple sort criteria are applied in order: first sort by Importance, then by Urgency as a tiebreaker."
