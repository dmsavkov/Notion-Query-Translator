task_id: archive_stale_tasks
task: "Find tasks where the 'Last Reviewed' date is older than 30 days. Archive them and add a comment to each saying 'This task is stale. Archived.'"
properties:
  stale_days: 30
  archive: true
  comment_text: "This task is stale. Archived."

solution: |
  def archive_stale_tasks(tasks_database_id):
      import os
      import requests
      from datetime import datetime, timedelta
      from dotenv import load_dotenv

      load_dotenv()
      notion_token = os.getenv("NOTION_TOKEN")
      headers = {
          "Authorization": f"Bearer {notion_token}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28",
      }

      cutoff_date = (datetime.now().date() - timedelta(days=30)).isoformat()

      query_url = f"https://api.notion.com/v1/databases/{tasks_database_id}/query"
      query_payload = {
          "filter": {
              "property": "Last Reviewed",
              "date": {
                  "on_or_before": cutoff_date
              }
          }
      }
      query_resp = requests.post(query_url, headers=headers, json=query_payload)
      pages = query_resp.json().get("results", [])

      archived_ids = []
      for page in pages:
          page_id = page["id"]

          archive_url = f"https://api.notion.com/v1/pages/{page_id}"
          archive_payload = {
              "archived": True
          }
          requests.patch(archive_url, headers=headers, json=archive_payload)

          comment_url = "https://api.notion.com/v1/comments"
          comment_payload = {
              "parent": {
                  "page_id": page_id
              },
              "rich_text": [
                  {
                      "type": "text",
                      "text": {
                          "content": "This task is stale. Archived."
                      }
                  }
              ]
          }
          requests.post(comment_url, headers=headers, json=comment_payload)
          archived_ids.append(page_id)

      return {"cutoff_date": cutoff_date, "archived": len(archived_ids), "page_ids": archived_ids}

correct_statements:
  - "Python datetime arithmetic computes a threshold date as current date minus timedelta(days=30)."
  - "The query filters tasks where 'Last Reviewed' property is on_or_before (or before) the cutoff using POST https://api.notion.com/v1/databases/{database_id}/query with {'property': 'Last Reviewed', 'date': {'on_or_before': '<calculated_date>'}} OR {'property': 'Last Reviewed', 'date': {'before': '<calculated_date>'}}."
  - "For every matched page id, PATCH https://api.notion.com/v1/pages/{page_id} is called with top-level body {'archived': True}."
  - "Archiving and commenting are performed via separate API calls (archive via PATCH, comment via POST https://api.notion.com/v1/comments), in either order."
  - "Comment payload uses {'parent': {'page_id': '<page_id>'}, 'rich_text': [{'type': 'text', 'text': {'content': 'This task is stale. Archived.'}}]}."
  - "The implementation performs both actions per page (archive then comment), not just one global comment request."
