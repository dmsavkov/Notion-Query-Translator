# read content from a meeting notes page
task: Retrieve all the content and blocks from the inbox page.
properties:
  page_size: 100

solution: |
  def get_page_content(page_id):
      import requests
      import os
      from dotenv import load_dotenv
      
      load_dotenv()
      NOTION_TOKEN = os.getenv("NOTION_TOKEN")
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      # This endpoint retrieves the children (content) of the page/block
      url = f"https://api.notion.com/v1/blocks/{page_id}/children"
      
      # Pagination parameter (Notion returns 100 blocks max per request)
      params = {
          "page_size": 100
      }
      
      response = requests.get(url, headers=HEADERS, params=params)
      
      if response.status_code == 200:
          blocks = response.json().get("results", [])
          # The agent would then parse these blocks to extract text
          return blocks
      else:
          return response.json()

  # Example usage:
  # get_page_content(os.getenv("NOTION_INBOX_PAGE_ID"))

correct_statements:
  - "Endpoint is GET https://api.notion.com/v1/blocks/{page_id}/children for retrieving a page's content."
  - "Header 'Notion-Version: 2022-06-28' is required on every request."
  - "Pagination limit is controlled via the 'page_size' query parameter (max 100)."
  - "Response results are under the 'results' key as an array of block objects."
  - "Each block has a 'type' field (e.g. 'paragraph', 'heading_1', 'to_do') and a matching nested key with its content."
  - "Subsequent pages are fetched using 'start_cursor' from the 'next_cursor' field in the response."
