# read content from a meeting notes page
task: Retrieve all the content and blocks from the inbox page.
properties:
  page_size: 100

solution: |
  def get_page_content(page_id):
      import requests
      
      NOTION_TOKEN = "your_integration_token"
      HEADERS = {
          "Authorization": f"Bearer {NOTION_TOKEN}",
          "Content-Type": "application/json",
          "Notion-Version": "2022-06-28"
      }
      
      # This endpoint retrieves the children (content) of the page/block
      url = f"https://api.notion.com/v1/blocks/{page_id}/children"
      
      # Pagination parameter (Notion returns 100 blocks max per request)
      params = {
          "page_size": 100
      }
      
      response = requests.get(url, headers=HEADERS, params=params)
      
      if response.status_code == 200:
          blocks = response.json().get("results", [])
          # The agent would then parse these blocks to extract text
          return blocks
      else:
          return response.json()
